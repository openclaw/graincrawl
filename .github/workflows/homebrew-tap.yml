name: Update Homebrew Tap

on:
  workflow_call:
    inputs:
      tag_name:
        description: "Release tag to sync (for example: v0.1.0)"
        required: true
        type: string
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to sync (for example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update-tap:
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name || inputs.tag_name, 'v')
    env:
      TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO || 'vincentkoc/tap' }}
    steps:
      - name: Validate tap configuration
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN}" ]; then
            echo "Secret HOMEBREW_TAP_GITHUB_TOKEN is required."
            exit 1
          fi
          if [ "$(gh api "repos/${TAP_REPO}" --jq '.permissions.push // false')" != "true" ]; then
            echo "HOMEBREW_TAP_GITHUB_TOKEN must have push access to ${TAP_REPO}."
            exit 1
          fi

      - name: Checkout tap repository
        uses: actions/checkout@v5
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Update formula
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag_name }}
          SOURCE_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REVISION="$(gh api "repos/${SOURCE_REPO}/git/ref/tags/${TAG}" --jq '.object.sha')"
          if [ "$(gh api "repos/${SOURCE_REPO}/git/ref/tags/${TAG}" --jq '.object.type')" = "tag" ]; then
            REVISION="$(gh api "repos/${SOURCE_REPO}/git/tags/${REVISION}" --jq '.object.sha')"
          fi

          mkdir -p Formula
          cat > Formula/graincrawl.rb <<EOF
          class Graincrawl < Formula
            desc "Local-first Granola crawler into SQLite and Markdown"
            homepage "https://github.com/${SOURCE_REPO}"
            url "https://github.com/${SOURCE_REPO}.git",
                tag: "${TAG}",
                revision: "${REVISION}"
            license "MIT"
            version "${TAG#v}"

            depends_on "go" => :build

            def install
              ldflags = "-s -w " \
                        "-X github.com/vincentkoc/graincrawl/internal/buildinfo.Version=#{version}"
              system "go", "build", *std_go_args(ldflags: ldflags), "./cmd/graincrawl"
              pkgshare.install "config.example.toml"
              doc.install "README.md", "LICENSE", "SPEC.md"
            end

            test do
              assert_match '"version"', shell_output("#{bin}/graincrawl version --json")
              assert_match "graincrawl archives Granola", shell_output("#{bin}/graincrawl --help")
            end
          end
          EOF

      - name: Commit and push formula update
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag_name }}
        run: |
          set -euo pipefail
          git add Formula/graincrawl.rb
          if git diff --cached --quiet; then
            echo "No tap changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update graincrawl formula for ${TAG}"
          git pull --rebase origin main
          git push
